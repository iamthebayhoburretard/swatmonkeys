<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-image: url("images/gif.gif");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
}

/* Intro screen */
#intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 3rem;
  cursor: pointer;
  z-index: 1000;
}

/* Hidden website content */
#content {
  display: none;
  text-align: center;
  color: white;
  padding-top: 100px;
}

h1 {
  font-size: 4rem;
  text-shadow: 2px 2px 10px black;
}
</style>
</head>
<body>

<div id="intro" onclick="enterSite()">
  Click to Enter
</div>

<div id="content">
  <h1>My Website</h1>
  <p>Welcome to my site.</p>
</div>

<script>
function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("content").style.display = "block";
}
</script>

</body>
</html>
